name: Deploy to Ionos (SFTP)

# Se activa automáticamente con cada push a main, y también manualmente
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Desplegar a producción
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔍 Debug de Secreto (Seguro)
        run: |
          echo "La contraseña tiene ${#PASS} caracteres."
        env:
          PASS: ${{ secrets.SFTP_PASS }}

      - name: 📤 Subir archivos (SCP Manual)
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.SFTP_PASS }}" scp -P 22 -o StrictHostKeyChecking=no -r ./* ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}
          sshpass -p "${{ secrets.SFTP_PASS }}" scp -P 22 -o StrictHostKeyChecking=no -r ./truque/* ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}/../truque

      - name: 🍲 Clonar y desplegar Recetario
        env:
          SPASS: ${{ secrets.SFTP_PASS }}
          SUSER: ${{ secrets.SFTP_USER }}
          SHOST: ${{ secrets.SFTP_HOST }}
          SPATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          # Clonar el repo privado del recetario usando PAT de GitHub
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/pablosalinas/recetario-moratalla.git /tmp/recetario

          # Crear directorio remoto con sftp en modo batch
          # (Ionos no permite sesión SSH interactiva, pero sí SFTP)
          # El prefijo '-' en '-mkdir' ignora el error si el directorio ya existe
          printf "cd %s\n-mkdir recetario\nquit\n" "$SPATH" | \
            sshpass -p "$SPASS" sftp \
              -o StrictHostKeyChecking=no \
              -b - \
              "$SUSER@$SHOST"

          # Subir archivos base PHP
          for file in index.php login.php logout.php; do
            if [ -f /tmp/recetario/$file ]; then
              sshpass -p "$SPASS" scp -P 22 -o StrictHostKeyChecking=no \
                /tmp/recetario/$file \
                "$SUSER@$SHOST:$SPATH/recetario/"
            fi
          done

          # Subir carpetas
          for dir in admin api inc css js img data; do
            if [ -d /tmp/recetario/$dir ]; then
              sshpass -p "$SPASS" scp -P 22 -o StrictHostKeyChecking=no -r \
                /tmp/recetario/$dir \
                "$SUSER@$SHOST:$SPATH/recetario/"
            fi
          done

          echo "✅ Recetario desplegado correctamente."

      - name: 🐬 Migraciones
        run: |
          echo "Ejecutando migraciones en la raíz..."
          curl -s "${{ secrets.SITE_URL }}/migrate_runner.php?secret=${{ secrets.MIGRATE_SECRET }}"
          echo "Ejecutando migraciones en /moratalla..."
          curl -s "${{ secrets.SITE_URL }}/moratalla/migrate_runner.php?secret=${{ secrets.MIGRATE_SECRET }}"

