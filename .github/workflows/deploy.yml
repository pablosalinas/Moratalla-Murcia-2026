name: Deploy to Ionos (SFTP)

# Se activa automáticamente con cada push a main
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 🚀 Desplegar a producción
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📤 Subir archivos (FTP/SFTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS || secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || 22 }}
          protocol: ${{ secrets.SFTP_PROTOCOL || 'sftp' }}
          local-dir: ./
          server-dir: ${{ secrets.SFTP_REMOTE_PATH }}

      - name: 🐬 Migraciones
        run: |
          curl -s "${{ secrets.SITE_URL }}/migrate_runner.php?secret=${{ secrets.MIGRATE_SECRET }}"
