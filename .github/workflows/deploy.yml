name: Deploy to Ionos (SFTP)

# Se activa automáticamente con cada push a main
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 🚀 Desplegar a producción
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🧪 Test de visibilidad de secreto
        run: |
          if [ -z "${{ secrets.SFTP_PASS }}" ]; then 
            echo "❌ ERROR: GitHub NO está pasando el secreto SFTP_PASS al proceso."
            exit 1
          else 
            echo "✅ OK: El secreto SFTP_PASS es visible."
          fi

      - name: 📤 Subir archivos (SFTP)
        uses: pressidium/sftp-deploy@v1.1.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          user: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 22
          local_path: ./
          remote_path: ${{ secrets.SFTP_REMOTE_PATH }}
          delete_remote_files: false

      - name: 🐬 Migraciones
        run: |
          curl -s "${{ secrets.SITE_URL }}/migrate_runner.php?secret=${{ secrets.MIGRATE_SECRET }}"
