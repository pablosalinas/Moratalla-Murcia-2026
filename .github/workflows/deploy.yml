name: Deploy to Ionos (SFTP)

# Se activa automáticamente con cada push a main, y también manualmente
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Desplegar a producción
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔍 Debug de Secreto (Seguro)
        run: |
          echo "La contraseña tiene ${#PASS} caracteres."
        env:
          PASS: ${{ secrets.SFTP_PASS }}

      - name: 📤 Subir archivos (SCP Manual)
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.SFTP_PASS }}" scp -P 22 -o StrictHostKeyChecking=no -r ./* ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}
          sshpass -p "${{ secrets.SFTP_PASS }}" scp -P 22 -o StrictHostKeyChecking=no -r ./truque/* ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}/../truque

      - name: 🍲 Clonar y desplegar Recetario
        run: |
          # Clonar el repo del recetario
          git clone --depth=1 https://github.com/pablosalinas/recetario-moratalla.git /tmp/recetario

          # Eliminar carpetas pesadas localmente
          rm -rf "/tmp/recetario/COCINA TRADICIONAL DE MORATALLA" "/tmp/recetario/GASTRONOMIA DE MORATALLA"
          rm -f "/tmp/recetario/test_auth.php" "/tmp/recetario/test_http.php" "/tmp/recetario/cookie.txt" "/tmp/recetario/cookie2.txt"

          # IMPORTANTE: Eliminar las carpetas pesadas del servidor remoto de Ionos para liberar espacio
          sshpass -p "${{ secrets.SFTP_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} "rm -rf \"${{ secrets.SFTP_REMOTE_PATH }}/recetario/COCINA TRADICIONAL DE MORATALLA\" \"${{ secrets.SFTP_REMOTE_PATH }}/recetario/GASTRONOMIA DE MORATALLA\"" || true

          # Subir el recetario usando exactamente el mismo método y sintaxis que el paso de SCP manual
          sshpass -p "${{ secrets.SFTP_PASS }}" scp -P 22 -o StrictHostKeyChecking=no -r /tmp/recetario/* ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}/recetario/
          sshpass -p "${{ secrets.SFTP_PASS }}" scp -P 22 -o StrictHostKeyChecking=no -r /tmp/recetario/.htaccess ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}/recetario/

          echo "✅ Recetario desplegado correctamente."
          echo "✅ Recetario desplegado correctamente."

      - name: 🐬 Migraciones
        run: |
          echo "Ejecutando migraciones en la raíz..."
          curl -s "${{ secrets.SITE_URL }}/migrate_runner.php?secret=${{ secrets.MIGRATE_SECRET }}"
          echo "Ejecutando migraciones en /moratalla..."
          curl -s "${{ secrets.SITE_URL }}/moratalla/migrate_runner.php?secret=${{ secrets.MIGRATE_SECRET }}"

